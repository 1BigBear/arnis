name: Generate Minecraft World

on:
  workflow_dispatch:
    inputs:
      world_name:
        description: 'World name (no spaces)'
        required: true
        default: 'my_world'
      bbox:
        description: 'Coords: min_lat,min_lon,max_lat,max_lon'
        required: true
        default: '48.858,2.294,48.859,2.295'
      terrain:
        description: 'Generate terrain?'
        type: boolean
        default: true
      scale:
        description: 'Scale factor'
        required: true
        default: '1.0'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-24.04-arm  # MUST HAVE ARM64 RUNNER ACCESS
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check ARM64
        run: |
          echo "Architecture: $(uname -m)"
          if [ "$(uname -m)" != "aarch64" ]; then
            echo "ERROR: Not running on ARM64!"
            exit 1
          fi
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      
      - name: Install system deps
        run: |
          sudo apt-get update || true
          sudo apt-get install -y libgtk-3-dev libglib2.0-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev libssl-dev pkg-config zip
      
      - name: Build Arnis CLI
        timeout-minutes: 30
        run: |
          echo "Building Arnis..."
          cargo build --no-default-features --features bedrock --release --target aarch64-unknown-linux-gnu 2>&1
          if [ ! -f "target/aarch64-unknown-linux-gnu/release/arnis" ]; then
            echo "ERROR: Build failed!"
            exit 1
          fi
          cp target/aarch64-unknown-linux-gnu/release/arnis ./arnis
          chmod +x ./arnis
          echo "Build successful"
      
      - name: Generate World
        timeout-minutes: 60
        run: |
          WORLD="${{ github.event.inputs.world_name }}"
          BBOX="${{ github.event.inputs.bbox }}"
          
          echo "Generating world: $WORLD"
          echo "BBOX: $BBOX"
          
          mkdir -p "world/$WORLD"
          
          CMD="./arnis --path=\"world/$WORLD\" --bbox=\"$BBOX\" --scale=${{ github.event.inputs.scale }}"
          
          if [ "${{ github.event.inputs.terrain }}" == "true" ]; then
            CMD="$CMD --terrain"
          fi
          
          echo "Executing: $CMD"
          eval $CMD
          
          if [ ! -d "world/$WORLD/region" ] && [ ! -f "world/$WORLD/level.dat" ]; then
            echo "WARNING: World folder looks empty or invalid"
            ls -la "world/$WORLD/" || true
          fi
      
      - name: Package World
        run: |
          WORLD="${{ github.event.inputs.world_name }}"
          DATE=$(date +%Y%m%d_%H%M%S)
          FILENAME="${WORLD}_${DATE}.zip"
          
          cd world
          zip -r "../$FILENAME" "$WORLD"
          cd ..
          
          if [ ! -f "$FILENAME" ]; then
            echo "ERROR: Zip creation failed!"
            exit 1
          fi
          
          ls -lh "$FILENAME"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV
      
      - name: Create Git Tag
        run: |
          WORLD="${{ github.event.inputs.world_name }}"
          TIMESTAMP=$(date +%s)
          TAG="world-${WORLD}-${TIMESTAMP}"
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git tag -a "$TAG" -m "Auto: $WORLD"
          git push origin "$TAG" || {
            echo "ERROR: Failed to push tag!"
            exit 1
          }
          
          echo "TAG=$TAG" >> $GITHUB_ENV
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: success()  # Only if previous steps succeeded
        with:
          tag_name: ${{ env.TAG }}
          name: "🎮 ${{ github.event.inputs.world_name }} - ${{ env.DATE }}"
          body: |
            ## World: ${{ github.event.inputs.world_name }}
            
            **Generated:** ${{ env.DATE }}  
            **Coords:** `${{ github.event.inputs.bbox }}`  
            **Terrain:** ${{ github.event.inputs.terrain }}  
            **Scale:** ${{ github.event.inputs.scale }}x
            
            Download the zip below, extract to Minecraft saves folder.
          files: ${{ env.FILENAME }}
      
      - name: Report Success
        if: success()
        run: |
          echo "## ✅ SUCCESS!" >> $GITHUB_STEP_SUMMARY
          echo "World: ${{ github.event.inputs.world_name }}" >> $GITHUB_STEP_SUMMARY
          echo "File: ${{ env.FILENAME }}" >> $GITHUB_STEP_SUMMARY
          echo "Download at: https://github.com/${{ github.repository }}/releases/tag/${{ env.TAG }}" >> $GITHUB_STEP_SUMMARY
      
      - name: Report Failure
        if: failure()
        run: |
          echo "## ❌ FAILED!" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for errors." >> $GITHUB_STEP_SUMMARY
