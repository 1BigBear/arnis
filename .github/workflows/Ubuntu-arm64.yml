name: Build for Proot-Distro Ubuntu ARM64

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-arm64-linux:
    runs-on: ubuntu-24.04-arm  # Native ARM64 runner (GitHub now provides these)
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-unknown-linux-gnu

    - name: Install system dependencies (ARM64)
      run: |
        sudo dpkg --add-architecture arm64
        sudo apt-get update
        sudo apt-get install -y \
          software-properties-common \
          build-essential \
          pkg-config \
          libssl-dev \
          libgtk-3-dev \
          libglib2.0-dev \
          libsoup-3.0-dev \
          libwebkit2gtk-4.1-dev \
          librust-atk-dev \
          libgdk-pixbuf2.0-dev \
          libcairo2-dev \
          libpango1.0-dev \
          curl \
          git

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        key: arm64-linux-${{ hashFiles('**/Cargo.lock') }}

    - name: Fetch dependencies
      run: cargo fetch

    - name: Build (CLI + Bedrock support, no GUI)
      run: |
        cargo build --no-default-features --features bedrock --release --target aarch64-unknown-linux-gnu
        cp target/aarch64-unknown-linux-gnu/release/arnis arnis-linux-arm64-cli
        chmod +x arnis-linux-arm64-cli

    - name: Build (Full GUI version)
      run: |
        cargo build --release --target aarch64-unknown-linux-gnu
        cp target/aarch64-unknown-linux-gnu/release/arnis arnis-linux-arm64-gui
        chmod +x arnis-linux-arm64-gui

    - name: Test binary
      run: |
        file arnis-linux-arm64-cli
        ./arnis-linux-arm64-cli --help

    - name: Upload CLI artifact
      uses: actions/upload-artifact@v4
      with:
        name: arnis-linux-arm64-cli
        path: arnis-linux-arm64-cli
        retention-days: 30

    - name: Upload GUI artifact
      uses: actions/upload-artifact@v4
      with:
        name: arnis-linux-arm64-gui
        path: arnis-linux-arm64-gui
        retention-days: 30

  release:
    needs: build-arm64-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download CLI artifact
      uses: actions/download-artifact@v4
      with:
        name: arnis-linux-arm64-cli
        path: ./artifacts

    - name: Download GUI artifact
      uses: actions/download-artifact@v4
      with:
        name: arnis-linux-arm64-gui
        path: ./artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./artifacts/arnis-linux-arm64-cli
          ./artifacts/arnis-linux-arm64-gui
        name: Release ${{ github.ref_name }} (ARM64 Linux)
        body: |
          ## ARM64 Linux Build for Proot-Distro
          
          This release includes binaries built for ARM64 Linux (`aarch64-unknown-linux-gnu`), 
          compatible with proot-distro Ubuntu on Android devices.
          
          ### Files:
          - **arnis-linux-arm64-cli**: Command-line only, lightweight, no GUI dependencies
          - **arnis-linux-arm64-gui**: Full GUI version (requires display server)
          
          ### Usage in Proot-Distro:
          ```bash
          # Download to your proot-distro
          wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/arnis-linux-arm64-cli
          chmod +x arnis-linux-arm64-cli
          ./arnis-linux-arm64-cli --help
          ```
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
