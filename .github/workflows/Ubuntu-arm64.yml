name: PRoot-Compatible ARM64 Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # This list satisfies both GTK3 (gdk-3.0) and GTK4 requirements
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libgtk-4-dev \
            libsqlite3-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libgraphene-1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Arnis (Release)
        # Using --locked to prevent dependency shifts
        run: cargo build --release --locked

      - name: Upload PRoot Binary
        uses: actions/upload-artifact@v4
        with:
          name: arnis-proot-arm64
          path: target/release/arnis
