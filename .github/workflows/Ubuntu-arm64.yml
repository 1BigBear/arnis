name: PRoot-Compatible ARM64 Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # Native ARM64 runner for 1:1 PRoot compatibility
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y software-properties-common
          sudo add-apt-repository universe
          # Adding backports to ensure libwebkit2gtk-4.1-dev is available
          echo "deb http://ports.ubuntu.com/ubuntu-ports $(lsb_release -sc)-backports main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          sudo apt update
          # Exact dependency list from the CI/Build workflow
          sudo apt install -y libgtk-3-dev build-essential pkg-config libglib2.0-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev

      - name: Build
        # Building for ARM64 release
        run: cargo build --release

      - name: Upload PRoot Binary
        uses: actions/upload-artifact@v4
        with:
          name: arnis-proot-arm64
          path: target/release/arnis
