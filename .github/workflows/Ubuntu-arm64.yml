name: PRoot-Compatible ARM64 Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # Using the native ARM64 runner for 1:1 compatibility with PRoot ARM64
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # This list covers every link-time dependency: 
          # SSL, GLib, GTK4 (Modern), SQLite3, and Pango for text rendering.
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libglib2.0-dev \
            libgtk-4-dev \
            libsqlite3-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libgraphene-1.0-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Arnis (Release)
        # Using --locked ensures it uses the exact dependency versions in the repo
        run: cargo build --release --locked

      - name: Upload PRoot Binary
        uses: actions/upload-artifact@v4
        with:
          name: arnis-proot-arm64
          path: target/release/arnis
